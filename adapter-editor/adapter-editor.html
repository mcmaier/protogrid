<script type="text/babel">
const { useState, useRef, useCallback, useEffect, useMemo } = React;

const BASE_GRID_OPTIONS = [2.54, 2.00, 1.27];
const DEFAULT_BASE_GRID = 2.54;

const BASE_PITCH_PROFILES = {
  '2.54': { pitch: 2.54, padSize: 1.6, drillSize: 1.0, defineSuffix: '2_54' },
  '2': { pitch: 2.0, padSize: 1.4, drillSize: 0.9, defineSuffix: '2_00' },
  '1.27': { pitch: 1.27, padSize: 1.0, drillSize: 0.6, defineSuffix: '1_27' },
};

const COLORS = {
  bg: "#1a1a2e", gridDot: "#334", gridDotTH: "#f08040", gridDotTHInner: "#a04020",
  smdPad: "#e8a030", smdPadStroke: "#c08020", trace: "#40d8d8", tracePreview: "#40d8d880",
  silk: "#e8e8e8", origin: "#ff4060", highlight: "#ffe040", panelBg: "#16213e",
  panelBorder: "#0f3460", accent: "#e94560", text: "#e0e0e0", textDim: "#888",
  btnBg: "#0f3460", inputBg: "#1a1a2e",
};

const DEFAULT_ADAPTER = {
  id: "ic-id", name: "New IC", category: "Not Set",
  meta: { author: "", license: "", source: "" },
  widthPins: 4, heightPins: 4,
  originOffset: { x: 0, y: 0, rot: 0 },
  smdPads: [], traces: [], throughPins: [], silkBody: null, silkLines: [], silkText: [],
  silkLabel: { x: 0, y: -1.5, show: false, height: 1.0 },
};

function extractSExprBlocks(source, head) {
  const blocks = [];
  let pos = 0;
  while ((pos = source.indexOf(head, pos)) !== -1) {
    let depth = 0;
    let end = pos;
    for (; end < source.length; end++) {
      if (source[end] === '(') depth++;
      else if (source[end] === ')') {
        depth--;
        if (depth === 0) { end++; break; }
      }
    }
    blocks.push(source.slice(pos, end));
    pos = end;
  }
  return blocks;
}

function parseKicadMod(text) {
  const topPads = [], bottomPads = [], vias = [], silkLines = [];
  let bodyPoly = null, m;

  const padBlocks = extractSExprBlocks(text.replace(/\r/g, ""), "(pad ");
  for (const block of padBlocks) {
    const header = block.match(/^\(pad\s+"([^"]*)"\s+(\w+)\s+(\w+)/);
    const at = block.match(/\(at\s+([-\d.]+)\s+([-\d.]+)(?:\s+([-\d.]+))?\)/);
    const size = block.match(/\(size\s+([-\d.]+)\s+([-\d.]+)\)/);
    if (!header || !at || !size) continue;

    const layerExpr = block.match(/\(layers\s+([^)]*)\)/);
    const quotedLayers = layerExpr ? [...layerExpr[1].matchAll(/"([^"]+)"/g)].map(s => s[1]) : [];
    const bareLayers = layerExpr ? layerExpr[1].replace(/"[^"]+"/g, "").trim().split(/\s+/).filter(Boolean) : [];
    const layers = [...quotedLayers, ...bareLayers];

    const drillMatch = block.match(/\(drill\s+([-\d.]+)/);
    const pad = {
      pin: header[1] || "",
      type: header[2],
      shape: header[3],
      x: parseFloat(at[1]),
      y: parseFloat(at[2]),
      rotation: parseFloat(at[3] || 0),
      w: parseFloat(size[1]),
      h: parseFloat(size[2]),
      drill: drillMatch ? parseFloat(drillMatch[1]) : 0,
      layers,
    };

    if (layers.includes("F.Cu") || layers.includes("*.Cu")) topPads.push(pad);
    if (layers.includes("B.Cu") || layers.includes("*.Cu")) bottomPads.push(pad);
    if ((pad.type === "thru_hole" || pad.type === "np_thru_hole") && pad.drill > 0) {
      vias.push({ x: pad.x, y: pad.y, size: roundTo(Math.max(pad.w, pad.h), 3), drill: roundTo(pad.drill, 3) });
    }
  }
  const fabPolyRegex = /\(fp_poly\s*\n?\s*\(pts\s*\n?\s*([\s\S]*?)\)[\s\S]*?\(layer\s+"F\.Fab"\)/;
  const polyMatch = fabPolyRegex.exec(text);
  if (polyMatch) {
    const ptRegex = /\(xy\s+([-\d.]+)\s+([-\d.]+)\)/g;
    const points = [];
    while ((m = ptRegex.exec(polyMatch[1])) !== null) points.push({ x: parseFloat(m[1]), y: parseFloat(m[2]) });
    if (points.length > 2) bodyPoly = points;
  }
  return { topPads, bottomPads, vias, silkLines, bodyPoly };
}

/**
 * Parse KiCad .kicad_pcb file. Extracts pads (from footprints), traces, vias,
 * and silkscreen lines on F.SilkS
 * on F.Cu and B.Cu, with board-relative coordinates (Y-down KiCad convention).
 */
function parseKicadPcb(text) {
  text = text.replace(/\r/g, "");

  // 1) Find board outline from Edge.Cuts gr_line/gr_rect
  let boardLeft = Infinity, boardTop = Infinity, boardRight = -Infinity, boardBottom = -Infinity;
  // Look for gr_line on Edge.Cuts
  const grLineRe = /\(gr_line\s+\(start\s+([\d.]+)\s+([\d.]+)\)\s+\(end\s+([\d.]+)\s+([\d.]+)\)[\s\S]*?\(layer\s+"Edge\.Cuts"\)/g;
  let m;
  while ((m = grLineRe.exec(text)) !== null) {
    for (const v of [parseFloat(m[1]), parseFloat(m[3])]) { boardLeft = Math.min(boardLeft, v); boardRight = Math.max(boardRight, v); }
    for (const v of [parseFloat(m[2]), parseFloat(m[4])]) { boardTop = Math.min(boardTop, v); boardBottom = Math.max(boardBottom, v); }
  }
  if (boardLeft === Infinity) return { error: "No board outline found on Edge.Cuts" };

  const boardW = roundTo(boardRight - boardLeft, 4);
  const boardH = roundTo(boardBottom - boardTop, 4);

  // 2) Extract pads from footprints with absolute coordinates
  const fcuPads = [], bcuPads = [];
  for (const fpBlock of extractSExprBlocks(text, "(footprint ")) {
    const nameMatch = fpBlock.match(/^\(footprint\s+"([^"]+)"/);
    if (!nameMatch) continue;
    const fpName = nameMatch[1].split(":").pop();

    const atMatch = fpBlock.match(/\(at\s+([-\d.]+)\s+([-\d.]+)(?:\s+([-\d.]+))?\)/);
    if (!atMatch) continue;
    const fx = parseFloat(atMatch[1]), fy = parseFloat(atMatch[2]);
    const fDeg = parseFloat(atMatch[3] || 0);
    const fRad = -fDeg * Math.PI / 180;  // negate: KiCad Y-down CW → standard CCW formula
    const cosR = Math.cos(fRad), sinR = Math.sin(fRad);

    for (const padBlock of extractSExprBlocks(fpBlock, "(pad ")) {
      const header = padBlock.match(/^\(pad\s+"([^"]*)"\s+(\w+)\s+(\w+)/);
      const padAt = padBlock.match(/\(at\s+([-\d.]+)\s+([-\d.]+)(?:\s+([-\d.]+))?\)/);
      const size = padBlock.match(/\(size\s+([-\d.]+)\s+([-\d.]+)\)/);
      if (!header || !padAt || !size) continue;

      const pin = header[1], ptype = header[2], pshape = header[3];
      const px = parseFloat(padAt[1]), py = parseFloat(padAt[2]);
      const pDeg = parseFloat(padAt[3] || 0);
      const sw = parseFloat(size[1]), sh = parseFloat(size[2]);
      const drillMatch = padBlock.match(/\(drill\s+([-\d.]+)/);
      const drill = drillMatch ? parseFloat(drillMatch[1]) : 0;

      const layerExpr = padBlock.match(/\(layers\s+([^)]*)\)/);
      const quotedLayers = layerExpr ? [...layerExpr[1].matchAll(/"([^"]+)"/g)].map(s => s[1]) : [];
      const bareLayers = layerExpr ? layerExpr[1].replace(/"[^"]+"/g, "").trim().split(/\s+/).filter(Boolean) : [];
      const layers = [...quotedLayers, ...bareLayers];

      // Absolute position: rotate pad pos by footprint rotation (KiCad CW Y-down)
      const ax = fx + px * cosR - py * sinR;
      const ay = fy + px * sinR + py * cosR;

      // Pad rotation: absolute = pad local + footprint rotation, normalize to 0-180°
      const norm = (360 -pDeg) % 360;
      const padRotation = roundTo(norm % 180,1);
      //const absRot = ((pDeg + fDeg) % 360 + 360) % 360;
      //const padRotation = roundTo(absRot % 180, 1);

      // Board-relative coords (Y still KiCad-down at this point)
      const rx = roundTo(ax - boardLeft, 4);
      const ry = roundTo(ay - boardTop, 4);

      const padData = { pin, fp: fpName, type: ptype, shape: pshape, x: rx, y: ry, w: roundTo(sw,4), h: roundTo(sh,4), drill, rotation: padRotation > 0.5 ? padRotation : 0 };

      if (ptype === "thru_hole" || ptype === "np_thru_hole" || (layers.includes("F.Cu") && layers.includes("B.Cu")) || layers.includes("*.Cu")) {
        fcuPads.push(padData);
        bcuPads.push(padData);
      } else if (layers.includes("F.Cu")) {
        fcuPads.push(padData);
      } else if (layers.includes("B.Cu")) {
        bcuPads.push(padData);
      }
    }
  }

  // 3) Segments (traces)
  const fcuTraces = [], bcuTraces = [];
  const segRe = /\(segment\s+\(start\s+([\d.]+)\s+([\d.]+)\)\s+\(end\s+([\d.]+)\s+([\d.]+)\)\s+\(width\s+([\d.]+)\)\s+\(layer\s+"([^"]+)"\)\s+\(net\s+(\d+)\)/g;
  while ((m = segRe.exec(text)) !== null) {
    const t = {
      x1: roundTo(parseFloat(m[1]) - boardLeft, 4),
      y1: roundTo(parseFloat(m[2]) - boardTop, 4),
      x2: roundTo(parseFloat(m[3]) - boardLeft, 4),
      y2: roundTo(parseFloat(m[4]) - boardTop, 4),
      w: parseFloat(m[5]),
      net: parseInt(m[7]),
    };
    if (m[6] === "F.Cu") fcuTraces.push(t);
    else if (m[6] === "B.Cu") bcuTraces.push(t);
  }

  // 4) Vias
  const vias = [];
  const viaRe = /\(via\s+\(at\s+([\d.]+)\s+([\d.]+)\)\s+\(size\s+([\d.]+)\)\s+\(drill\s+([\d.]+)\)/g;
  while ((m = viaRe.exec(text)) !== null) {
    vias.push({
      x: roundTo(parseFloat(m[1]) - boardLeft, 4),
      y: roundTo(parseFloat(m[2]) - boardTop, 4),
      size: parseFloat(m[3]),
      drill: parseFloat(m[4]),
    });
  }

  // 5) Silkscreen (F.SilkS)
  const silkLines = [];
  const silkText = [];

  const grSilkLineRe = /\(gr_line\s+\(start\s+([-\d.]+)\s+([-\d.]+)\)\s+\(end\s+([-\d.]+)\s+([-\d.]+)\)[\s\S]*?\(layer\s+"F\.SilkS"\)/g;
  while ((m = grSilkLineRe.exec(text)) !== null) {
    silkLines.push({
      x1: roundTo(parseFloat(m[1]) - boardLeft, 4),
      y1: roundTo(parseFloat(m[2]) - boardTop, 4),
      x2: roundTo(parseFloat(m[3]) - boardLeft, 4),
      y2: roundTo(parseFloat(m[4]) - boardTop, 4),
    });
  }

  const fpSilkLineRe = /\(fp_line\s+\(start\s+([-\d.]+)\s+([-\d.]+)\)\s+\(end\s+([-\d.]+)\s+([-\d.]+)\)[\s\S]*?\(layer\s+"F\.SilkS"\)/g;
  const fpSilkRectRe = /\(fp_rect\s+\(start\s+([-\d.]+)\s+([-\d.]+)\)\s+\(end\s+([-\d.]+)\s+([-\d.]+)\)[\s\S]*?\(layer\s+"F\.SilkS"\)/g;

  const addSilkLine = (lx1, ly1, lx2, ly2, fx, fy, cosR, sinR) => {
    const x1 = fx + lx1 * cosR - ly1 * sinR;
    const y1 = fy + lx1 * sinR + ly1 * cosR;
    const x2 = fx + lx2 * cosR - ly2 * sinR;
    const y2 = fy + lx2 * sinR + ly2 * cosR;
    silkLines.push({ x1: roundTo(x1 - boardLeft, 4), y1: roundTo(y1 - boardTop, 4), x2: roundTo(x2 - boardLeft, 4), y2: roundTo(y2 - boardTop, 4) });
  };

  for (const fpBlock of extractSExprBlocks(text, "(footprint ")) {
    const nameMatch = fpBlock.match(/^\(footprint\s+"([^"]+)"/);
    if (!nameMatch) continue;
    const fpName = nameMatch[1].split(":").pop();

    const atMatch = fpBlock.match(/\(at\s+([-\d.]+)\s+([-\d.]+)(?:\s+([-\d.]+))?\)/);
    if (!atMatch) continue;
    const fx = parseFloat(atMatch[1]), fy = parseFloat(atMatch[2]);
    const fDeg = parseFloat(atMatch[3] || 0);
    const fRad = -fDeg * Math.PI / 180;  // negate: KiCad Y-down CW → standard CCW formula
    const cosR = Math.cos(fRad), sinR = Math.sin(fRad);

    // fp_line silkscreen
    let sm;
    fpSilkLineRe.lastIndex = 0;
    while ((sm = fpSilkLineRe.exec(fpBlock)) !== null) {
      addSilkLine(parseFloat(sm[1]), parseFloat(sm[2]), parseFloat(sm[3]), parseFloat(sm[4]), fx, fy, cosR, sinR);
    }

    // fp_rect silkscreen (expand to 4 lines)
    let rm;
    fpSilkRectRe.lastIndex = 0;
    while ((rm = fpSilkRectRe.exec(fpBlock)) !== null) {
      const x1 = parseFloat(rm[1]), y1 = parseFloat(rm[2]), x2 = parseFloat(rm[3]), y2 = parseFloat(rm[4]);
      addSilkLine(x1, y1, x2, y1, fx, fy, cosR, sinR);
      addSilkLine(x2, y1, x2, y2, fx, fy, cosR, sinR);
      addSilkLine(x2, y2, x1, y2, fx, fy, cosR, sinR);
      addSilkLine(x1, y2, x1, y1, fx, fy, cosR, sinR);
    }

    const addSilkTextEntry = (txt, tx, ty, tRot, fontH) => {
      const absX = fx + tx * cosR - ty * sinR;
      const absY = fy + tx * sinR + ty * cosR;
      const absRot = ((fDeg + tRot) % 360 + 360) % 360;
      silkText.push({ text: txt, fp: fpName, x: roundTo(absX - boardLeft, 4), y: roundTo(absY - boardTop, 4), height: roundTo(fontH, 4), rotation: roundTo(absRot, 2) });
    };

    // Older KiCad syntax: (fp_text reference "R1" ...)
    const fpRefTextRe = /\(fp_text\s+reference\s+"([^"]+)"\s+\(at\s+([-\d.]+)\s+([-\d.]+)(?:\s+([-\d.]+))?\)[\s\S]*?\(layer\s+"F\.SilkS"\)[\s\S]*?\(effects\s+\(font\s+\(size\s+([-\d.]+)\s+([-\d.]+)\)/g;
    let tm;
    while ((tm = fpRefTextRe.exec(fpBlock)) !== null) {
      addSilkTextEntry(tm[1], parseFloat(tm[2]), parseFloat(tm[3]), parseFloat(tm[4] || 0), parseFloat(tm[6]));
    }

    // KiCad v7+ syntax: (property "Reference" ...)
    for (const propBlock of extractSExprBlocks(fpBlock, '(property "Reference"')) {
      if (!/\(layer\s+"F\.SilkS"\)/.test(propBlock)) continue;
      const nameM = propBlock.match(/^\(property\s+"Reference"\s+"([^"]+)"/);
      const propAt = propBlock.match(/\(at\s+([-\d.]+)\s+([-\d.]+)(?:\s+([-\d.]+))?\)/);
      if (!nameM || !propAt) continue;
      const propFont = propBlock.match(/\(effects\s+\(font\s+\(size\s+([-\d.]+)\s+([-\d.]+)\)/);
      const fontH = propFont ? parseFloat(propFont[2]) : 1;
      addSilkTextEntry(nameM[1], parseFloat(propAt[1]), parseFloat(propAt[2]), parseFloat(propAt[3] || 0), fontH);
    }
  }

  // 6) Nets
  const nets = {};
  const netRe = /\(net\s+(\d+)\s+"([^"]*)"\)/g;
  while ((m = netRe.exec(text)) !== null) {
    nets[parseInt(m[1])] = m[2];
  }

  return {
    boardW, boardH, boardLeft, boardTop,
    fcuPads, bcuPads,
    fcuTraces, bcuTraces,
    vias, nets, silkLines, silkText,
  };
}

  function rotatePointAroundOrigin(point, rotationDeg) {
    const rad = rotationDeg * Math.PI / 180;
    const cosR = Math.cos(rad);
    const sinR = Math.sin(rad);
    return {
      x: roundTo(point.x * cosR - point.y * sinR, 4),
      y: roundTo(point.x * sinR + point.y * cosR, 4),
    };
  }

  function rotateTraceSegments(segments, rotationDeg) {
    return segments.map(seg => {
      const p1 = rotatePointAroundOrigin({ x: seg.x1, y: seg.y1 }, rotationDeg);
      const p2 = rotatePointAroundOrigin({ x: seg.x2, y: seg.y2 }, rotationDeg);
      return { ...seg, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y };
    });
  }

  function normalizeRotation(rotationDeg) {
    return roundTo(((rotationDeg % 360) + 360) % 360, 1);
  }

  function applyFootprintRotationToImport(imported, rotationDeg) {
    if (!rotationDeg) return imported;

    const rotateWithPadRotation = (pad) => {
      const point = rotatePointAroundOrigin({ x: pad.x, y: pad.y }, rotationDeg);
      const originalRotation = pad.rotation || 0;
      return {
        ...pad,
        x: point.x,
        y: point.y,
        rotation: normalizeRotation(originalRotation + rotationDeg),
      };
    };

    return {
      ...imported,
      smdPads: (imported.smdPads || []).map(rotateWithPadRotation),
      bottomPads: (imported.bottomPads || []).map(rotateWithPadRotation),
      topTraces: (imported.topTraces || []).map(t => ({ ...t, segments: rotateTraceSegments(t.segments || [], rotationDeg) })),
      bottomTraces: (imported.bottomTraces || []).map(t => ({ ...t, segments: rotateTraceSegments(t.segments || [], rotationDeg) })),
      vias: (imported.vias || []).map(v => {
        const point = rotatePointAroundOrigin({ x: v.x, y: v.y }, rotationDeg);
        return { ...v, x: point.x, y: point.y };
      }),
      silkBody: imported.silkBody ? imported.silkBody.map(p => rotatePointAroundOrigin(p, rotationDeg)) : imported.silkBody,
      silkLines: (imported.silkLines || []).map(s => {
        const p1 = rotatePointAroundOrigin({ x: s.x1, y: s.y1 }, rotationDeg);
        const p2 = rotatePointAroundOrigin({ x: s.x2, y: s.y2 }, rotationDeg);
        return { ...s, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y };
      }),
      silkText: (imported.silkText || []).map(t => {
        const point = rotatePointAroundOrigin({ x: t.x, y: t.y }, rotationDeg);
        return {
          ...t,
          x: point.x,
          y: point.y,
          rotation: normalizeRotation((t.rotation || 0) + rotationDeg),
        };
      }),
    };
  }

/**
 * Convert parsed KiCad PCB data to adapter editor format.
 * KiCad Y-down is flipped to editor Y-up.
 */
function kicadPcbToAdapter(parsed) {
  if (parsed.error) return null;
  const { boardW, boardH, fcuPads, bcuPads, fcuTraces, bcuTraces, vias, nets, silkLines, silkText } = parsed;

  // Flip Y: editor uses Y-up, KiCad uses Y-down. newY = boardH - oldY
  const flipY = (y) => roundTo(boardH - y, 4);

  // KiCad CW rotation in Y-down becomes CCW in Y-up after flip — matches Gerber convention directly
  const toPad = (p, i) => ({
    pin: parseInt(p.pin) || (i + 1),
    x: p.x, y: flipY(p.y),
    w: p.w, h: p.h,
    rotation: -p.rotation || 0,
    fp: p.fp, netPin: p.pin,
  });

  // F.Cu SMD pads only (thru_hole handled separately as drills)
  const smdPads = fcuPads.filter(p => p.type !== 'thru_hole').map(toPad);

  // B.Cu SMD pads
  const bottomPads = bcuPads.filter(p => p.type !== 'thru_hole').map(toPad);

  // Thru_hole pads become drill entries (vias)
  const thruHoleDrills = fcuPads
    .filter(p => p.type === 'thru_hole' && p.drill > 0)
    .map(p => ({
      x: p.x, y: flipY(p.y),
      size: roundTo(Math.max(p.w, p.h), 3),
      drill: roundTo(p.drill, 3),
    }));

  // Convert F.Cu traces
  const topTraces = fcuTraces.map(t => ({
    segments: [{ x1: t.x1, y1: flipY(t.y1), x2: t.x2, y2: flipY(t.y2), w: t.w }],
    layer: "F.Cu", net: t.net,
  }));

  // Convert B.Cu traces
  const bottomTraces = bcuTraces.map(t => ({
    segments: [{ x1: t.x1, y1: flipY(t.y1), x2: t.x2, y2: flipY(t.y2), w: t.w }],
    layer: "B.Cu", net: t.net,
  }));

  // Convert vias + thru_hole pads
  const editorVias = [
    ...vias.map(v => ({ x: v.x, y: flipY(v.y), size: v.size, drill: v.drill })),
    ...thruHoleDrills,
  ];

  const editorSilkLines = silkLines.map(s => ({
    x1: s.x1,
    y1: flipY(s.y1),
    x2: s.x2,
    y2: flipY(s.y2),
  }));

  const editorSilkText = silkText.map(t => ({
    text: t.text,
    x: t.x,
    y: flipY(t.y),
    height: t.height,
    rotation: t.rotation,
    fp: t.fp,
  }));

  return {
    smdPads,
    bottomPads,
    topTraces,
    bottomTraces,
    vias: editorVias,
    silkLines: editorSilkLines,
    silkText: editorSilkText,
    boardW, boardH,
    nets,
  };
}


function roundTo(val, dec = 4) { return Math.round(val * 10 ** dec) / 10 ** dec; }

const ZOOM_LEVELS = [6, 8, 10, 14, 18, 24, 32, 40, 50, 60, 70, 80];

function AdapterEditor() {
  const [adapter, setAdapter] = useState(DEFAULT_ADAPTER);
  const [baseGrid, setBaseGrid] = useState(DEFAULT_BASE_GRID);
  const [zoom, setZoom] = useState(4);
  const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
  const [tool, setTool] = useState("select");
  const [tracePoints, setTracePoints] = useState([]);
  const [traceWidth, setTraceWidth] = useState(0.3);
  const [mousePos, setMousePos] = useState(null);
  const [snapToGrid, setSnapToGrid] = useState(false);
  const [snapSmall, setSnapSmall] = useState(true);
  const [selectedTrace, setSelectedTrace] = useState(null);
  const [selectedPad, setSelectedPad] = useState(null);
  const [showCode, setShowCode] = useState(false);
  const [importText, setImportText] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [maskExpansion, setMaskExpansion] = useState(0.05);
  const [bottomPads, setBottomPads] = useState([]);
  const [bottomTraces, setBottomTraces] = useState([]);
  const [vias, setVias] = useState([]);
  const [showLayer, setShowLayer] = useState("both"); // "F.Cu", "B.Cu", "both"
  const [basePitchKey, setBasePitchKey] = useState('2.54');
  const svgRef = useRef(null);
  const isPanning = useRef(false);
  const panStart = useRef({ x: 0, y: 0 });
  const pxPerMm = ZOOM_LEVELS[zoom] || 18;
  const [interfacePinPad, setInterfacePinPad] = useState(BASE_PITCH_PROFILES['2.54'].padSize);
  const [interfacePinDrill, setInterfacePinDrill] = useState(BASE_PITCH_PROFILES['2.54'].drillSize);
  const [showJsonSelect, setShowJsonSelect] = useState(false);
  const [jsonSelectOptions, setJsonSelectOptions] = useState([]);
  const jsonFileInputRef = useRef(null);
  const [selectedSilkLabel, setSelectedSilkLabel] = useState(false);
  const isDraggingSilkLabel = useRef(false);
  const didDragSilkLabel = useRef(false);
  const dragSilkLabelStart = useRef(null);
  const isDraggingSilkText = useRef(false);
  const dragSilkTextStart = useRef(null);
  const [selectedBottomPad, setSelectedBottomPad] = useState(null);
  const [selectedBottomTrace, setSelectedBottomTrace] = useState(null);
  const [selectedVia, setSelectedVia] = useState(null);
  const [selectedSilkLine, setSelectedSilkLine] = useState(null);
  const [selectedSilkText, setSelectedSilkText] = useState(null);

  const toScreen = useCallback((x, y) => ({
    sx: x * pxPerMm + panOffset.x,
    sy: -y * pxPerMm + panOffset.y,
  }), [pxPerMm, panOffset]);

  const toWorld = useCallback((sx, sy) => ({
    x: roundTo((sx - panOffset.x) / pxPerMm, 3),
    y: roundTo(-(sy - panOffset.y) / pxPerMm, 3),
  }), [pxPerMm, panOffset]);

  const snapWorld = useCallback((wx, wy) => {
    if (snapToGrid) return { x: roundTo(Math.round(wx / baseGrid) * baseGrid, 4), y: roundTo(Math.round(wy / baseGrid) * baseGrid, 4) };
    if (snapSmall) { const s = 0.127; return { x: roundTo(Math.round(wx / s) * s, 4), y: roundTo(Math.round(wy / s) * s, 4) }; }
    return { x: roundTo(wx, 3), y: roundTo(wy, 3) };
  }, [snapToGrid, snapSmall, baseGrid]);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    setZoom(z => Math.max(0, Math.min(ZOOM_LEVELS.length - 1, z + (e.deltaY > 0 ? -1 : 1))));
  }, []);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    el.addEventListener("wheel", handleWheel, { passive: false });
    return () => el.removeEventListener("wheel", handleWheel);
  }, [handleWheel]);

  const handleMouseDown = (e) => {
    if (e.button === 1 || (e.button === 0 && e.altKey)) {
      isPanning.current = true;
      panStart.current = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
      e.preventDefault();
    } else if (e.button === 0 && tool === 'select' && selectedSilkLabel && adapter.silkLabel?.show) {
      const rect = svgRef.current?.getBoundingClientRect();
      if (rect) {
        const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
        const w = toWorld(sx, sy);
        const lp = transformPoint(adapter.silkLabel.x, adapter.silkLabel.y);
        const fontH = adapter.silkLabel.height || 1;
        const approxHalfW = adapter.name.length * fontH * 0.3 + 0.5;
        if (Math.abs(w.x - lp.x) < approxHalfW && Math.abs(w.y - lp.y) < fontH + 0.3) {
          isDraggingSilkLabel.current = true;
          didDragSilkLabel.current = false;
          dragSilkLabelStart.current = { wx: w.x, wy: w.y, lx: adapter.silkLabel.x, ly: adapter.silkLabel.y };
        }
      }
    } else if (e.button === 0 && tool === 'select' && selectedSilkText !== null) {
      const rect = svgRef.current?.getBoundingClientRect();
      if (rect) {
        const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
        const w = toWorld(sx, sy);
        const t = adapter.silkText[selectedSilkText];
        if (t) {
          const tp = transformPoint(t.x, t.y);
          const fh = t.height || 1;
          if (Math.abs(w.x - tp.x) < t.text.length * fh * 0.3 + 0.5 && Math.abs(w.y - tp.y) < fh + 0.3) {
            isDraggingSilkText.current = true;
            dragSilkTextStart.current = { wx: w.x, wy: w.y, lx: t.x, ly: t.y };
          }
        }
      }
    }
  };

  const handleMouseMove = (e) => {
    const rect = svgRef.current?.getBoundingClientRect();
    if (!rect) return;
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    if (isPanning.current) { setPanOffset({ x: e.clientX - panStart.current.x, y: e.clientY - panStart.current.y }); return; }
    const w = toWorld(sx, sy);
    if (isDraggingSilkLabel.current && dragSilkLabelStart.current) {
      const dx = w.x - dragSilkLabelStart.current.wx;
      const dy = w.y - dragSilkLabelStart.current.wy;
      didDragSilkLabel.current = true;
      setAdapter(a => ({ ...a, silkLabel: { ...a.silkLabel, x: roundTo(dragSilkLabelStart.current.lx + dx, 3), y: roundTo(dragSilkLabelStart.current.ly + dy, 3) } }));
    } else if (isDraggingSilkText.current && dragSilkTextStart.current) {
      const dx = w.x - dragSilkTextStart.current.wx;
      const dy = w.y - dragSilkTextStart.current.wy;
      setAdapter(a => { const st = [...a.silkText]; st[selectedSilkText] = { ...st[selectedSilkText], x: roundTo(dragSilkTextStart.current.lx + dx, 3), y: roundTo(dragSilkTextStart.current.ly + dy, 3) }; return { ...a, silkText: st }; });
    }
    setMousePos({ screen: { sx, sy }, world: w, snapped: snapWorld(w.x, w.y) });
  };

  const handleMouseUp = () => { isPanning.current = false; isDraggingSilkLabel.current = false; isDraggingSilkText.current = false; };

  const finishTrace = useCallback(() => {
    if (tracePoints.length >= 2) {
      const segments = [];
      for (let i = 0; i < tracePoints.length - 1; i++) {
        const p1 = inverseTransformPoint(tracePoints[i].x, tracePoints[i].y);
        const p2 = inverseTransformPoint(tracePoints[i + 1].x, tracePoints[i + 1].y);
        segments.push({ x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, w: traceWidth });
      }
      setAdapter(a => ({ ...a, traces: [...a.traces, { segments }] }));
    }
    setTracePoints([]);
  }, [tracePoints, traceWidth, inverseTransformPoint]);

  const handleKeyDown = useCallback((e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === "Escape") {
      if (tool === "trace" && tracePoints.length > 0) { setTracePoints([]); } // abort trace drawing, stay in trace mode
      else { setTracePoints([]); setTool("select"); setSelectedSilkLabel(false); setSelectedBottomPad(null); setSelectedBottomTrace(null); setSelectedVia(null); setSelectedSilkLine(null); setSelectedSilkText(null); }
    }
    else if (e.key === "Enter") finishTrace();
    else if (e.key === "Delete" || e.key === "Backspace") {
      if (selectedTrace !== null) { setAdapter(a => ({ ...a, traces: a.traces.filter((_, i) => i !== selectedTrace) })); setSelectedTrace(null); }
      else if (selectedPad !== null) { setAdapter(a => ({ ...a, smdPads: a.smdPads.filter((_, i) => i !== selectedPad) })); setSelectedPad(null); }
      else if (selectedBottomPad !== null) { setBottomPads(p => p.filter((_, i) => i !== selectedBottomPad)); setSelectedBottomPad(null); }
      else if (selectedBottomTrace !== null) { setBottomTraces(t => t.filter((_, i) => i !== selectedBottomTrace)); setSelectedBottomTrace(null); }
      else if (selectedVia !== null) { setVias(v => v.filter((_, i) => i !== selectedVia)); setSelectedVia(null); }
      else if (selectedSilkLine !== null) { setAdapter(a => ({ ...a, silkLines: a.silkLines.filter((_, i) => i !== selectedSilkLine) })); setSelectedSilkLine(null); }
      else if (selectedSilkText !== null) { setAdapter(a => ({ ...a, silkText: a.silkText.filter((_, i) => i !== selectedSilkText) })); setSelectedSilkText(null); }
    }
    else if (selectedSilkLabel && ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(e.key)) {
      e.preventDefault();
      const step = e.shiftKey ? 0.127 : 0.5;
      const dx = e.key === "ArrowLeft" ? -step : e.key === "ArrowRight" ? step : 0;
      const dy = e.key === "ArrowUp" ? step : e.key === "ArrowDown" ? -step : 0;
      setAdapter(a => ({ ...a, silkLabel: { ...a.silkLabel, x: roundTo(a.silkLabel.x + dx, 3), y: roundTo(a.silkLabel.y + dy, 3) } }));
    }
    else if (selectedSilkText !== null && ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(e.key)) {
      e.preventDefault();
      const step = e.shiftKey ? 0.127 : 0.5;
      const dx = e.key === "ArrowLeft" ? -step : e.key === "ArrowRight" ? step : 0;
      const dy = e.key === "ArrowUp" ? step : e.key === "ArrowDown" ? -step : 0;
      setAdapter(a => { const st = [...a.silkText]; st[selectedSilkText] = { ...st[selectedSilkText], x: roundTo(st[selectedSilkText].x + dx, 3), y: roundTo(st[selectedSilkText].y + dy, 3) }; return { ...a, silkText: st }; });
    }
    else if (e.key === "v") { setTool("select"); setTracePoints([]); }
    else if (e.key === "t") { setTool("trace"); setTracePoints([]); }
    else if (e.key === "p") { setTool("edit-pins"); setTracePoints([]); }
    else if (e.key === "g") { setSnapToGrid(s => !s); setSnapSmall(false); }
    else if (e.key === "s") { setSnapSmall(s => !s); setSnapToGrid(false); }
    else if (e.key === "z" && e.ctrlKey) setAdapter(a => ({ ...a, traces: a.traces.slice(0, -1) }));
  }, [finishTrace, tool, tracePoints, selectedTrace, selectedPad, selectedBottomPad, selectedBottomTrace, selectedVia, selectedSilkLine, selectedSilkText, selectedSilkLabel]);

  useEffect(() => {
    window.addEventListener("keydown", handleKeyDown);
    return () => window.removeEventListener("keydown", handleKeyDown);
  }, [handleKeyDown]);

  useEffect(() => {
    const rect = svgRef.current?.getBoundingClientRect();
    if (!rect) return;
    const cx = (adapter.widthPins - 1) * baseGrid / 2;
    const cy = (adapter.heightPins - 1) * baseGrid / 2;
    setPanOffset({ x: rect.width / 2 - cx * pxPerMm, y: rect.height / 2 + cy * pxPerMm });
  }, [adapter.widthPins, adapter.heightPins, pxPerMm, baseGrid]);

  const doImport = () => {
    const parsed = parseKicadMod(importText);
    if (parsed.topPads.length === 0 && parsed.bottomPads.length === 0) return;

    const toEditorPad = (p, idx) => ({
      pin: parseInt(p.pin) || (idx + 1),
      x: roundTo(p.x, 3),
      y: roundTo(-p.y, 3),
      rotation: p.rotation ? roundTo(-p.rotation, 1) : 0,
      w: roundTo(p.w, 3),
      h: roundTo(p.h, 3),
    });
    const imported = {
      smdPads: parsed.topPads.map(toEditorPad),
      bottomPads: parsed.bottomPads.map(toEditorPad),
      silkBody: parsed.bodyPoly ? parsed.bodyPoly.map(p => ({ x: roundTo(p.x, 3), y: roundTo(-p.y, 3) })) : null,
      silkLines: [],
      silkText: [],
      topTraces: [],
      bottomTraces: [],
      vias: parsed.vias.map(v => ({ x: roundTo(v.x, 3), y: roundTo(-v.y, 3), size: v.size, drill: v.drill })),
    };
    const rotated = applyFootprintRotationToImport(imported, adapter.originOffset.rot || 0);
    setAdapter(a => ({ ...a, meta: { ...(a.meta || {}), source: "Imported from KiCad" }, smdPads: rotated.smdPads, silkBody: rotated.silkBody, silkLines: rotated.silkLines, silkText: rotated.silkText, traces: rotated.topTraces.map(t => ({ ...t, applyOriginOffset: true })) }));
    setBottomTraces(rotated.bottomTraces);
    setBottomPads(rotated.bottomPads || []);
    setVias(rotated.vias);
    setShowImport(false);
  };

  const handleFileImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setImportText(ev.target.result); };
    reader.readAsText(file);
  };

  const loadJsonAdapter = useCallback((obj) => {
    const newBaseGrid = obj.pitch || DEFAULT_BASE_GRID;
    const pitchKey = String(newBaseGrid);
    const profile = BASE_PITCH_PROFILES[pitchKey] || BASE_PITCH_PROFILES['2.54'];

    const newSmdPads = (obj.features?.copper || [])
      .filter(e => e.type === 'pad')
      .map((p, i) => ({ pin: i + 1, x: p.x, y: p.y, w: p.w, h: p.h, rotation: p.rotation || 0 }));

    const newTraces = (obj.features?.copper || [])
      .filter(e => e.type === 'trace')
      .map(t => ({ segments: [{ x1: t.x1, y1: t.y1, x2: t.x2, y2: t.y2, w: t.w }], applyOriginOffset: false }));

    const newBottomPads = (obj.features?.copperBack || [])
      .filter(e => e.type === 'pad')
      .map((p, i) => ({ pin: i + 1, x: p.x, y: p.y, w: p.w, h: p.h, rotation: p.rotation || 0 }));

    const newBottomTraces = (obj.features?.copperBack || [])
      .filter(e => e.type === 'trace')
      .map(t => ({ segments: [{ x1: t.x1, y1: t.y1, x2: t.x2, y2: t.y2, w: t.w }], applyOriginOffset: false }));

    const newVias = (obj.features?.drills || []).map(d => ({ x: d.x, y: d.y, size: d.size, drill: d.drill }));

    const silkItems = obj.features?.silk || [];
    let newSilkBody = null;
    const newSilkLines = [];
    silkItems.forEach(s => {
      if (s.type === 'poly' && s.points) {
        if (s.points.length > 2) {
          // Schlusspunkt entfernen (wird beim Export dupliziert)
          newSilkBody = s.points.slice(0, -1);
        } else if (s.points.length === 2) {
          newSilkLines.push({ x1: s.points[0].x, y1: s.points[0].y, x2: s.points[1].x, y2: s.points[1].y });
        }
      }
      // Kreise (Pin-1-Marker) werden automatisch regeneriert – nicht laden
    });

    const newSilkText = (obj.features?.silkText || []).map(t => ({
      text: t.text, x: t.x, y: t.y, height: t.height || 1, rotation: t.rotation || 0,
    }));

    setBaseGrid(newBaseGrid);
    setBasePitchKey(pitchKey);
    setInterfacePinPad(profile.padSize);
    setInterfacePinDrill(profile.drillSize);
    setBottomPads(newBottomPads);
    setBottomTraces(newBottomTraces);
    setVias(newVias);
    setAdapter({
      id: obj.id || 'ic-id',
      name: obj.name || 'New IC',
      meta: { author: obj.meta?.author || "", license: obj.meta?.license || "", source: obj.meta?.source || "" },
      category: obj.category || 'Not Set',
      widthPins: obj.widthPins || 4,
      heightPins: obj.heightPins || 4,
      originOffset: { x: 0, y: 0, rot: 0 },
      smdPads: newSmdPads,
      traces: newTraces,
      throughPins: (obj.throughPins || []).map(tp => ({ col: tp.col, row: tp.row, label: tp.label })),
      silkBody: newSilkBody,
      silkLines: newSilkLines,
      silkText: newSilkText,
      silkLabel: obj.silkLabel
        ? { x: obj.silkLabel.x || 0, y: obj.silkLabel.y || -1.5, height: obj.silkLabel.height || 1.0, show: true }
        : DEFAULT_ADAPTER.silkLabel,
    });
    setShowJsonSelect(false);
  }, []);

  const handleOpenJson = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const list = Array.isArray(parsed) ? parsed : [parsed];
        if (list.length === 1) {
          loadJsonAdapter(list[0]);
        } else {
          setJsonSelectOptions(list);
          setShowJsonSelect(true);
        }
      } catch (err) {
        alert('Error loading JSON file: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const transformPoint = useCallback((x, y) => {
    const rot = adapter.originOffset.rot || 0;
    const ox = adapter.originOffset.x || 0;
    const oy = adapter.originOffset.y || 0;
    if (!rot) return { x: x + ox, y: y + oy };
    const rad = rot * Math.PI / 180;
    const cosR = Math.cos(rad);
    const sinR = Math.sin(rad);
    return {
      x: x * cosR - y * sinR + ox,
      y: x * sinR + y * cosR + oy,
    };
  }, [adapter.originOffset.rot, adapter.originOffset.x, adapter.originOffset.y]);

  const transformRotation = useCallback((rot = 0) => {
    const out = roundTo((rot || 0) + (adapter.originOffset.rot || 0), 2);
    return Math.abs(out) < 0.01 ? 0 : out;
  }, [adapter.originOffset.rot]);

  const inverseTransformPoint = useCallback((x, y) => {
    const rot = adapter.originOffset.rot || 0;
    const ox = adapter.originOffset.x || 0;
    const oy = adapter.originOffset.y || 0;
    const dx = x - ox, dy = y - oy;
    if (!rot) return { x: roundTo(dx, 3), y: roundTo(dy, 3) };
    const rad = -rot * Math.PI / 180;
    const cosR = Math.cos(rad), sinR = Math.sin(rad);
    return { x: roundTo(dx * cosR - dy * sinR, 3), y: roundTo(dx * sinR + dy * cosR, 3) };
  }, [adapter.originOffset.rot, adapter.originOffset.x, adapter.originOffset.y]);

  const transformTracePoint = useCallback((trace, x, y) => {
    return transformPoint(x, y);
  }, [transformPoint]);

  const generateJson = useMemo(() => {
    const { id, name, category, widthPins, heightPins, smdPads, traces, throughPins, silkBody, silkLines, silkText } = adapter;

    const copper = [];
    smdPads.forEach(p => {
      const pos = transformPoint(p.x, p.y);
      const rot = transformRotation(p.rotation || 0);
      const pad = { type: 'pad', x: roundTo(pos.x, 4), y: roundTo(pos.y, 4), w: p.w, h: p.h };
      if (rot) pad.rotation = rot;
      copper.push(pad);
    });
    traces.forEach(t => { t.segments.forEach(s => {
      const p1 = transformTracePoint(t, s.x1, s.y1);
      const p2 = transformTracePoint(t, s.x2, s.y2);
      copper.push({ type: 'trace', x1: roundTo(p1.x, 4), y1: roundTo(p1.y, 4), x2: roundTo(p2.x, 4), y2: roundTo(p2.y, 4), w: s.w });
    }); });

    const mask = smdPads.map(p => {
      const pos = transformPoint(p.x, p.y);
      const rot = transformRotation(p.rotation || 0);
      const pad = { type: 'pad', x: roundTo(pos.x, 4), y: roundTo(pos.y, 4), w: roundTo(p.w + maskExpansion * 2, 4), h: roundTo(p.h + maskExpansion * 2, 4) };
      if (rot) pad.rotation = rot;
      return pad;
    });

    const silk = [];
    if (silkBody && silkBody.length > 2) {
      const points = silkBody.map(pt => { const p = transformPoint(pt.x, pt.y); return { x: roundTo(p.x, 4), y: roundTo(p.y, 4) }; });
      points.push({ x: points[0].x, y: points[0].y });
      silk.push({ type: 'poly', points });
    }
    silkLines.forEach(s => {
      const p1 = transformPoint(s.x1, s.y1);
      const p2 = transformPoint(s.x2, s.y2);
      silk.push({ type: 'poly', points: [{ x: roundTo(p1.x, 4), y: roundTo(p1.y, 4) }, { x: roundTo(p2.x, 4), y: roundTo(p2.y, 4) }] });
    });
    if (smdPads.length > 0) {
      const p1 = smdPads[0];
      const marker = transformPoint(p1.x - 0.3, p1.y + 0.5);
      silk.push({ type: 'circle', x: roundTo(marker.x, 4), y: roundTo(marker.y, 4), d: 0.25 });
    }

    const features = { copper, mask, silk };

    if (bottomPads.length > 0 || bottomTraces.length > 0) {
      const copperBack = [];
      bottomPads.forEach(p => {
        const pos = transformPoint(p.x, p.y);
        const rot = transformRotation(p.rotation || 0);
        const pad = { type: 'pad', x: roundTo(pos.x, 4), y: roundTo(pos.y, 4), w: p.w, h: p.h };
        if (rot) pad.rotation = rot;
        copperBack.push(pad);
      });
      bottomTraces.forEach(t => { t.segments.forEach(s => {
        const p1 = transformTracePoint(t, s.x1, s.y1);
        const p2 = transformTracePoint(t, s.x2, s.y2);
        copperBack.push({ type: 'trace', x1: roundTo(p1.x, 4), y1: roundTo(p1.y, 4), x2: roundTo(p2.x, 4), y2: roundTo(p2.y, 4), w: s.w });
      }); });
      features.copperBack = copperBack;
    }

    if (vias.length > 0) {
      features.drills = vias.map(v => {
        const p = transformPoint(v.x, v.y);
        return { x: roundTo(p.x, 4), y: roundTo(p.y, 4), drill: v.drill, size: v.size };
      });
    }

    const silkTextEntries = silkText.map(t => {
      const p = transformPoint(t.x, t.y);
      return { type: 'text', text: t.text, x: roundTo(p.x, 4), y: roundTo(p.y, 4), height: t.height || 1, rotation: transformRotation(t.rotation || 0) };
    });
    if (silkTextEntries.length > 0) features.silkText = silkTextEntries;

    const overlay = false;

    const metaEntries = Object.entries({ author: adapter.meta?.author, license: adapter.meta?.license, source: adapter.meta?.source }).filter(([, v]) => v);
    const obj = {
      id,
      name,
      ...(metaEntries.length ? { meta: Object.fromEntries(metaEntries) } : {}),
      category,
      pitch: baseGrid,
      color: '#a060c0',
      throughPins: throughPins.map(tp => ({ col: tp.col, row: tp.row, label: tp.label })),
      features,
      outline: { width: roundTo((widthPins - 1) * baseGrid + 2, 1), height: roundTo((heightPins - 1) * baseGrid + 2, 1) },
      outlineOffset: { x: 0, y: 0 },
      widthPins,
      heightPins,      
      ...(adapter.silkLabel?.show ? { silkLabel: { text: adapter.name, rotation: 0, x: adapter.silkLabel.x, y: adapter.silkLabel.y, height: adapter.silkLabel.height || 1 } } : {}),
      overlay,
    };

    // Custom formatter: keep leaf objects (all-primitive values) on one line
    const formatJson = (val, indent) => {
      if (val === null || typeof val !== 'object') return JSON.stringify(val);
      if (Array.isArray(val)) {
        if (val.length === 0) return '[]';
        const items = val.map(v => formatJson(v, indent + '  '));
        // If every item is a leaf object or primitive, put each on its own line but compact
        const isLeafArray = val.every(v => v !== null && typeof v === 'object' && !Array.isArray(v) &&
          Object.values(v).every(x => x === null || typeof x !== 'object'));
        if (isLeafArray) {
          return '[\n' + items.map(s => indent + '  ' + s).join(',\n') + '\n' + indent + ']';
        }
        return '[\n' + items.map(s => indent + '  ' + s).join(',\n') + '\n' + indent + ']';
