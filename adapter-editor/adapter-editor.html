<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridGen Adapter Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect, useMemo } = React;

const GRID = 2.54;
const COLORS = {
  bg: "#1a1a2e", gridDot: "#334", gridDotTH: "#f08040", gridDotTHInner: "#a04020",
  smdPad: "#e8a030", smdPadStroke: "#c08020", trace: "#40d8d8", tracePreview: "#40d8d880",
  silk: "#e8e8e8", origin: "#ff4060", highlight: "#ffe040", panelBg: "#16213e",
  panelBorder: "#0f3460", accent: "#e94560", text: "#e0e0e0", textDim: "#888",
  btnBg: "#0f3460", inputBg: "#1a1a2e",
};

const DEFAULT_ADAPTER = {
  id: "soic8", name: "SOIC-8", category: "SOIC",
  widthPins: 4, heightPins: 4,
  originOffset: { x: 0, y: 0 },
  smdPads: [], traces: [], throughPins: [], silkBody: null,
};

function parseKicadMod(text) {
  const pads = [], silkLines = [];
  let bodyPoly = null, m;
  const padRegex = /\(pad\s+"(\d+)"\s+smd\s+\w+\s*\n?\s*\(at\s+([-\d.]+)\s+([-\d.]+)\)\s*\n?\s*\(size\s+([-\d.]+)\s+([-\d.]+)\)/g;
  while ((m = padRegex.exec(text)) !== null) {
    pads.push({ pin: parseInt(m[1]), x: parseFloat(m[2]), y: parseFloat(m[3]), w: parseFloat(m[4]), h: parseFloat(m[5]) });
  }
  const fabPolyRegex = /\(fp_poly\s*\n?\s*\(pts\s*\n?\s*([\s\S]*?)\)[\s\S]*?\(layer\s+"F\.Fab"\)/;
  const polyMatch = fabPolyRegex.exec(text);
  if (polyMatch) {
    const ptRegex = /\(xy\s+([-\d.]+)\s+([-\d.]+)\)/g;
    const points = [];
    while ((m = ptRegex.exec(polyMatch[1])) !== null) points.push({ x: parseFloat(m[1]), y: parseFloat(m[2]) });
    if (points.length > 2) bodyPoly = points;
  }
  return { pads, silkLines, bodyPoly };
}

/**
 * Parse RS-274X Gerber file. Extracts flashed pads and drawn traces.
 * Returns { pads: [{x, y, w, h, shape}], traces: [{x1, y1, x2, y2, w}] }
 */

/**
 * Parse RS-274X Gerber file. Extracts flashed pads and drawn traces.
 */
function parseGerber(text) {
  const apertures = {};
  const pads = [];
  const traces = [];
  let unitMul = 1, fmtDecX = 4, fmtDecY = 4;
  const rawLines = text.replace(/\r/g, "").split("\n");
  for (let line of rawLines) {
    line = line.trim();
    if (!line) continue;
    let m = line.match(/%FSLA?X(\d)(\d)Y(\d)(\d)\*%/);
    if (m) { fmtDecX = parseInt(m[2]); fmtDecY = parseInt(m[4]); continue; }
    if (line.includes("%MOMM*%")) { unitMul = 1; continue; }
    if (line.includes("%MOIN*%")) { unitMul = 25.4; continue; }
    m = line.match(/%ADD(\d+)([A-Z]),?([\d.]+)?(?:X([\d.]+))?\*%/);
    if (m) {
      const dc = parseInt(m[1]), shape = m[2];
      const p1 = parseFloat(m[3] || 0) * unitMul;
      const p2 = m[4] ? parseFloat(m[4]) * unitMul : p1;
      if (shape === "C") apertures[dc] = { shape: "circle", d: p1 };
      else if (shape === "R") apertures[dc] = { shape: "rect", w: p1, h: p2 };
      else if (shape === "O") apertures[dc] = { shape: "oblong", w: p1, h: p2 };
      continue;
    }
    if (line.startsWith("%") || line.startsWith("G04")) continue;
  }
  let curX = 0, curY = 0, prevX = 0, prevY = 0, curAp = null;
  for (let line of rawLines) {
    line = line.trim();
    if (!line || line.startsWith("%") || line.startsWith("G04") || line === "M02*") continue;
    let m = line.match(/^D(\d+)\*$/);
    if (m) { curAp = parseInt(m[1]); continue; }
    m = line.match(/^(?:X([-+]?\d+))?(?:Y([-+]?\d+))?D0([123])\*$/);
    if (!m) continue;
    prevX = curX; prevY = curY;
    if (m[1] !== undefined) curX = (parseInt(m[1]) / Math.pow(10, fmtDecX)) * unitMul;
    if (m[2] !== undefined) curY = (parseInt(m[2]) / Math.pow(10, fmtDecY)) * unitMul;
    const op = parseInt(m[3]);
    const ap = apertures[curAp] || {};
    if (op === 3) {
      if (ap.shape === "rect" || ap.shape === "oblong")
        pads.push({ x: roundTo(curX,4), y: roundTo(curY,4), w: roundTo(ap.w,4), h: roundTo(ap.h,4) });
      else if (ap.shape === "circle")
        pads.push({ x: roundTo(curX,4), y: roundTo(curY,4), w: roundTo(ap.d,4), h: roundTo(ap.d,4) });
    } else if (op === 1) {
      const w = ap.shape === "circle" ? ap.d : (ap.w || 0.15);
      traces.push({ x1: roundTo(prevX,4), y1: roundTo(prevY,4), x2: roundTo(curX,4), y2: roundTo(curY,4), w: roundTo(w,4) });
    }
  }
  return { pads, traces };
}

/**
 * Parse KiCad .kicad_pcb file. Extracts pads (from footprints), traces, and vias
 * on F.Cu and B.Cu, with board-relative coordinates (Y-down KiCad convention).
 */
function parseKicadPcb(text) {
  text = text.replace(/\r/g, "");

  // 1) Find board outline from Edge.Cuts gr_line/gr_rect
  let boardLeft = Infinity, boardTop = Infinity, boardRight = -Infinity, boardBottom = -Infinity;
  // Look for gr_line on Edge.Cuts
  const grLineRe = /\(gr_line\s+\(start\s+([\d.]+)\s+([\d.]+)\)\s+\(end\s+([\d.]+)\s+([\d.]+)\)[\s\S]*?\(layer\s+"Edge\.Cuts"\)/g;
  let m;
  while ((m = grLineRe.exec(text)) !== null) {
    for (const v of [parseFloat(m[1]), parseFloat(m[3])]) { boardLeft = Math.min(boardLeft, v); boardRight = Math.max(boardRight, v); }
    for (const v of [parseFloat(m[2]), parseFloat(m[4])]) { boardTop = Math.min(boardTop, v); boardBottom = Math.max(boardBottom, v); }
  }
  if (boardLeft === Infinity) return { error: "No board outline found on Edge.Cuts" };

  const boardW = roundTo(boardRight - boardLeft, 4);
  const boardH = roundTo(boardBottom - boardTop, 4);

  // 2) Extract pads from footprints with absolute coordinates
  const fcuPads = [], bcuPads = [];
  // Split into footprint blocks
  const fpRe = /\(footprint\s+"([^"]+)"([\s\S]*?)\n\t\)/g;
  while ((m = fpRe.exec(text)) !== null) {
    const fpName = m[1].split(":").pop();
    const fpBody = m[2];
    const atMatch = fpBody.match(/^\s*\(at\s+([\d.]+)\s+([\d.]+)(?:\s+([-\d.]+))?\)/m);
    if (!atMatch) continue;
    const fx = parseFloat(atMatch[1]), fy = parseFloat(atMatch[2]);
    const fDeg = parseFloat(atMatch[3] || 0);
    const fRad = fDeg * Math.PI / 180;
    const cosR = Math.cos(fRad), sinR = Math.sin(fRad);

    const padRe = /\(pad\s+"([^"]+)"\s+(\w+)\s+(\w+)\s+\(at\s+([-\d.]+)\s+([-\d.]+)(?:\s+([-\d.]+))?\)\s+\(size\s+([-\d.]+)\s+([-\d.]+)\)(?:[\s\S]*?\(drill\s+([\d.]+)\))?[\s\S]*?\(layers\s+"([^"]*)"(?:\s+"([^"]*)")?(?:\s+"([^"]*)")?\)/g;
    let pm;
    while ((pm = padRe.exec(fpBody)) !== null) {
      const pin = pm[1], ptype = pm[2], pshape = pm[3];
      const px = parseFloat(pm[4]), py = parseFloat(pm[5]);
      const pDeg = parseFloat(pm[6] || 0);
      let sw = parseFloat(pm[7]), sh = parseFloat(pm[8]);
      const drill = parseFloat(pm[9] || 0);
      const layers = [pm[10], pm[11], pm[12]].filter(Boolean);

      // Absolute position: rotate pad pos by footprint rotation
      const ax = fx + px * cosR - py * sinR;
      const ay = fy + px * sinR + py * cosR;

      // Swap w/h based on absolute pad orientation
      // KiCad stores pad rotation as absolute (world-relative) when footprint is rotated
      // So the pad's own rotation already accounts for footprint rotation
      const norm = ((pDeg % 360) + 360) % 360;
      if (Math.abs(norm - 90) < 1 || Math.abs(norm - 270) < 1) {
        [sw, sh] = [sh, sw];
      }

      // Board-relative coords (Y still KiCad-down at this point)
      const rx = roundTo(ax - boardLeft, 4);
      const ry = roundTo(ay - boardTop, 4);

      const padData = { pin, fp: fpName, type: ptype, shape: pshape, x: rx, y: ry, w: roundTo(sw,4), h: roundTo(sh,4), drill };

      if (ptype === "thru_hole" || layers.includes("F.Cu") && layers.includes("B.Cu")) {
        fcuPads.push(padData);
        bcuPads.push(padData);
      } else if (layers.includes("F.Cu")) {
        fcuPads.push(padData);
      } else if (layers.includes("B.Cu")) {
        bcuPads.push(padData);
      }
    }
  }

  // 3) Segments (traces)
  const fcuTraces = [], bcuTraces = [];
  const segRe = /\(segment\s+\(start\s+([\d.]+)\s+([\d.]+)\)\s+\(end\s+([\d.]+)\s+([\d.]+)\)\s+\(width\s+([\d.]+)\)\s+\(layer\s+"([^"]+)"\)\s+\(net\s+(\d+)\)/g;
  while ((m = segRe.exec(text)) !== null) {
    const t = {
      x1: roundTo(parseFloat(m[1]) - boardLeft, 4),
      y1: roundTo(parseFloat(m[2]) - boardTop, 4),
      x2: roundTo(parseFloat(m[3]) - boardLeft, 4),
      y2: roundTo(parseFloat(m[4]) - boardTop, 4),
      w: parseFloat(m[5]),
      net: parseInt(m[7]),
    };
    if (m[6] === "F.Cu") fcuTraces.push(t);
    else if (m[6] === "B.Cu") bcuTraces.push(t);
  }

  // 4) Vias
  const vias = [];
  const viaRe = /\(via\s+\(at\s+([\d.]+)\s+([\d.]+)\)\s+\(size\s+([\d.]+)\)\s+\(drill\s+([\d.]+)\)/g;
  while ((m = viaRe.exec(text)) !== null) {
    vias.push({
      x: roundTo(parseFloat(m[1]) - boardLeft, 4),
      y: roundTo(parseFloat(m[2]) - boardTop, 4),
      size: parseFloat(m[3]),
      drill: parseFloat(m[4]),
    });
  }

  // 5) Nets
  const nets = {};
  const netRe = /\(net\s+(\d+)\s+"([^"]*)"\)/g;
  while ((m = netRe.exec(text)) !== null) {
    nets[parseInt(m[1])] = m[2];
  }

  return {
    boardW, boardH, boardLeft, boardTop,
    fcuPads, bcuPads,
    fcuTraces, bcuTraces,
    vias, nets,
  };
}

/**
 * Convert parsed KiCad PCB data to adapter editor format.
 * KiCad Y-down is flipped to editor Y-up.
 */
function kicadPcbToAdapter(parsed) {
  if (parsed.error) return null;
  const { boardW, boardH, fcuPads, bcuPads, fcuTraces, bcuTraces, vias, nets } = parsed;

  // Flip Y: editor uses Y-up, KiCad uses Y-down. newY = boardH - oldY
  const flipY = (y) => roundTo(boardH - y, 4);

  // Convert pads (F.Cu only for display, numbered by position)
  const smdPads = fcuPads.map((p, i) => ({
    pin: parseInt(p.pin) || (i + 1),
    x: p.x, y: flipY(p.y),
    w: p.w, h: p.h,
    fp: p.fp, netPin: p.pin,
  }));

  // Convert F.Cu traces
  const topTraces = fcuTraces.map(t => ({
    segments: [{ x1: t.x1, y1: flipY(t.y1), x2: t.x2, y2: flipY(t.y2), w: t.w }],
    layer: "F.Cu", net: t.net,
  }));

  // Convert B.Cu traces
  const bottomTraces = bcuTraces.map(t => ({
    segments: [{ x1: t.x1, y1: flipY(t.y1), x2: t.x2, y2: flipY(t.y2), w: t.w }],
    layer: "B.Cu", net: t.net,
  }));

  // Convert vias
  const editorVias = vias.map(v => ({
    x: v.x, y: flipY(v.y), size: v.size, drill: v.drill,
  }));

  return {
    smdPads,
    topTraces,
    bottomTraces,
    vias: editorVias,
    boardW, boardH,
    nets,
  };
}


function roundTo(val, dec = 4) { return Math.round(val * 10 ** dec) / 10 ** dec; }

const ZOOM_LEVELS = [6, 8, 10, 14, 18, 24, 32, 40, 50];

function AdapterEditor() {
  const [adapter, setAdapter] = useState(DEFAULT_ADAPTER);
  const [zoom, setZoom] = useState(4);
  const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
  const [tool, setTool] = useState("select");
  const [tracePoints, setTracePoints] = useState([]);
  const [traceWidth, setTraceWidth] = useState(0.3);
  const [mousePos, setMousePos] = useState(null);
  const [snapToGrid, setSnapToGrid] = useState(false);
  const [snapSmall, setSnapSmall] = useState(true);
  const [selectedTrace, setSelectedTrace] = useState(null);
  const [selectedPad, setSelectedPad] = useState(null);
  const [showCode, setShowCode] = useState(false);
  const [importText, setImportText] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [maskExpansion, setMaskExpansion] = useState(0.05);
  const [bottomTraces, setBottomTraces] = useState([]);
  const [vias, setVias] = useState([]);
  const [showLayer, setShowLayer] = useState("both"); // "F.Cu", "B.Cu", "both"
  const svgRef = useRef(null);
  const isPanning = useRef(false);
  const panStart = useRef({ x: 0, y: 0 });
  const pxPerMm = ZOOM_LEVELS[zoom] || 18;

  const toScreen = useCallback((x, y) => ({
    sx: x * pxPerMm + panOffset.x,
    sy: -y * pxPerMm + panOffset.y,
  }), [pxPerMm, panOffset]);

  const toWorld = useCallback((sx, sy) => ({
    x: roundTo((sx - panOffset.x) / pxPerMm, 3),
    y: roundTo(-(sy - panOffset.y) / pxPerMm, 3),
  }), [pxPerMm, panOffset]);

  const snapWorld = useCallback((wx, wy) => {
    if (snapToGrid) return { x: roundTo(Math.round(wx / GRID) * GRID, 4), y: roundTo(Math.round(wy / GRID) * GRID, 4) };
    if (snapSmall) { const s = 0.127; return { x: roundTo(Math.round(wx / s) * s, 4), y: roundTo(Math.round(wy / s) * s, 4) }; }
    return { x: roundTo(wx, 3), y: roundTo(wy, 3) };
  }, [snapToGrid, snapSmall]);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    setZoom(z => Math.max(0, Math.min(ZOOM_LEVELS.length - 1, z + (e.deltaY > 0 ? -1 : 1))));
  }, []);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    el.addEventListener("wheel", handleWheel, { passive: false });
    return () => el.removeEventListener("wheel", handleWheel);
  }, [handleWheel]);

  const handleMouseDown = (e) => {
    if (e.button === 1 || (e.button === 0 && e.altKey)) {
      isPanning.current = true;
      panStart.current = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
      e.preventDefault();
    }
  };

  const handleMouseMove = (e) => {
    const rect = svgRef.current?.getBoundingClientRect();
    if (!rect) return;
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    if (isPanning.current) { setPanOffset({ x: e.clientX - panStart.current.x, y: e.clientY - panStart.current.y }); return; }
    const w = toWorld(sx, sy);
    setMousePos({ screen: { sx, sy }, world: w, snapped: snapWorld(w.x, w.y) });
  };

  const handleMouseUp = () => { isPanning.current = false; };

  const finishTrace = useCallback(() => {
    if (tracePoints.length >= 2) {
      const segments = [];
      for (let i = 0; i < tracePoints.length - 1; i++) {
        segments.push({ x1: tracePoints[i].x, y1: tracePoints[i].y, x2: tracePoints[i + 1].x, y2: tracePoints[i + 1].y, w: traceWidth });
      }
      setAdapter(a => ({ ...a, traces: [...a.traces, { segments }] }));
    }
    setTracePoints([]);
  }, [tracePoints, traceWidth]);

  const handleKeyDown = useCallback((e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === "Escape") { setTracePoints([]); setTool("select"); }
    else if (e.key === "Enter") finishTrace();
    else if (e.key === "Delete" || e.key === "Backspace") {
      if (selectedTrace !== null) { setAdapter(a => ({ ...a, traces: a.traces.filter((_, i) => i !== selectedTrace) })); setSelectedTrace(null); }
    }
    else if (e.key === "t") setTool(t => t === "trace" ? "select" : "trace");
    else if (e.key === "g") { setSnapToGrid(s => !s); setSnapSmall(false); }
    else if (e.key === "s") { setSnapSmall(s => !s); setSnapToGrid(false); }
    else if (e.key === "z" && e.ctrlKey) setAdapter(a => ({ ...a, traces: a.traces.slice(0, -1) }));
  }, [finishTrace, selectedTrace]);

  useEffect(() => {
    window.addEventListener("keydown", handleKeyDown);
    return () => window.removeEventListener("keydown", handleKeyDown);
  }, [handleKeyDown]);

  useEffect(() => {
    const rect = svgRef.current?.getBoundingClientRect();
    if (!rect) return;
    const cx = (adapter.widthPins - 1) * GRID / 2;
    const cy = (adapter.heightPins - 1) * GRID / 2;
    setPanOffset({ x: rect.width / 2 - cx * pxPerMm, y: rect.height / 2 + cy * pxPerMm });
  }, [adapter.widthPins, adapter.heightPins, pxPerMm]);

  const doImport = () => {
    const parsed = parseKicadMod(importText);
    if (parsed.pads.length === 0) return;
    const pads = parsed.pads.map(p => ({ pin: p.pin, x: roundTo(p.x, 3), y: roundTo(-p.y, 3), w: roundTo(p.w, 3), h: roundTo(p.h, 3) }));
    const body = parsed.bodyPoly ? parsed.bodyPoly.map(p => ({ x: roundTo(p.x, 3), y: roundTo(-p.y, 3) })) : null;
    setAdapter(a => ({ ...a, smdPads: pads, silkBody: body, traces: [] }));
    setShowImport(false);
  };

  const handleFileImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setImportText(ev.target.result); };
    reader.readAsText(file);
  };

  const generateCode = useMemo(() => {
    const { id, name, category, widthPins, heightPins, smdPads, traces, throughPins, originOffset, silkBody } = adapter;
    const ox = originOffset.x, oy = originOffset.y;
    let c = `  {\n    id: '${id}',\n    name: '${name}',\n    category: '${category}',\n    pitch: 2.54,\n    color: '#a060c0',\n\n`;
    c += `    throughPins: [\n`;
    throughPins.forEach(tp => { c += `      { col: ${tp.col}, row: ${tp.row}, label: '${tp.label}' },\n`; });
    c += `    ],\n\n    features: {\n      copper: [\n        // SMD pads\n`;
    smdPads.forEach(p => { c += `        { type: 'pad', x: ${roundTo(p.x + ox, 4)}, y: ${roundTo(p.y + oy, 4)}, w: ${p.w}, h: ${p.h} },   // Pin ${p.pin}\n`; });
    c += `\n        // F.Cu traces\n`;
    traces.forEach(t => { t.segments.forEach(s => { c += `        { type: 'trace', x1: ${roundTo(s.x1 + ox, 4)}, y1: ${roundTo(s.y1 + oy, 4)}, x2: ${roundTo(s.x2 + ox, 4)}, y2: ${roundTo(s.y2 + oy, 4)}, w: ${s.w} },\n`; }); });
    c += `      ],\n`;

    // B.Cu (copperBack)
    if (bottomTraces.length > 0) {
      c += `      copperBack: [\n`;
      bottomTraces.forEach(t => { t.segments.forEach(s => { c += `        { type: 'trace', x1: ${roundTo(s.x1 + ox, 4)}, y1: ${roundTo(s.y1 + oy, 4)}, x2: ${roundTo(s.x2 + ox, 4)}, y2: ${roundTo(s.y2 +oy, 4)}, w: ${s.w} },\n`; }); });
      c += `      ],\n`;
    }

    // Vias (drills)
    if (vias.length > 0) {
      c += `      drills: [\n`;
      vias.forEach(v => { c += `        { x: ${roundTo(v.x + ox, 4)}, y: ${roundTo(v.y + oy, 4)}, drill: ${v.drill}, size: ${v.size} },\n`; });
      c += `      ],\n`;
    }

    c += `      mask: [\n`;
    smdPads.forEach(p => { c += `        { type: 'pad', x: ${roundTo(p.x + ox, 4)}, y: ${roundTo(p.y + oy, 4)}, w: ${roundTo(p.w + maskExpansion * 2, 4)}, h: ${roundTo(p.h + maskExpansion * 2, 4)} },\n`; });
    c += `      ],\n      silk: [\n`;
    if (silkBody && silkBody.length > 2) {
      c += `        { type: 'poly', points: [\n`;
      silkBody.forEach(pt => { c += `          { x: ${roundTo(pt.x + ox, 4)}, y: ${roundTo(pt.y + oy, 4)} },\n`; });
      c += `          { x: ${roundTo(silkBody[0].x + ox, 4)}, y: ${roundTo(silkBody[0].y + oy, 4)} },\n        ]},\n`;
    }
    if (smdPads.length > 0) {
      const p1 = smdPads[0];
      c += `        { type: 'circle', x: ${roundTo(p1.x + ox - 0.3, 4)}, y: ${roundTo(p1.y + oy + 0.5, 4)}, d: 0.25 },\n`;
    }
    c += `      ],\n    },\n\n`;
    c += `    outline: { width: ${roundTo((widthPins - 1) * GRID + 2, 1)}, height: ${roundTo((heightPins - 1) * GRID + 2, 1)} },\n`;
    c += `    outlineOffset: { x: 0, y: 0 },\n    widthPins: ${widthPins},\n    heightPins: ${heightPins},\n  },`;
    return c;
  }, [adapter, maskExpansion, bottomTraces, vias]);

  const gridDots = [];
  for (let c = 0; c < adapter.widthPins; c++)
    for (let r = 0; r < adapter.heightPins; r++)
      gridDots.push({ x: c * GRID, y: r * GRID, col: c, row: r });

          (() => {
            const o = toScreen(0, 0);
            return React.createElement("g", null,
              React.createElement("line", { x1: o.sx - 10, y1: o.sy, x2: o.sx + 10, y2: o.sy, stroke: COLORS.origin, strokeWidth: 1.5 }),
              React.createElement("line", { x1: o.sx, y1: o.sy - 10, x2: o.sx, y2: o.sy + 10, stroke: COLORS.origin, strokeWidth: 1.5 }),
            );
          })(),
        ),

        // Zoom label
        React.createElement("div", { style: { position: "absolute", bottom: 8, right: 8, background: COLORS.panelBg + "cc", padding: "4px 10px", borderRadius: 4, fontSize: 10, color: COLORS.textDim } },
          `${pxPerMm}px/mm | Alt+Drag=Pan | Scroll=Zoom | Ctrl+Z=Undo`
        ),
      ),

      // Code panel
      showCode && React.createElement("div", { style: { width: 420, borderLeft: `1px solid ${COLORS.panelBorder}`, background: COLORS.panelBg, display: "flex", flexDirection: "column" } },
        React.createElement("div", { style: { padding: "8px 12px", borderBottom: `1px solid ${COLORS.panelBorder}`, display: "flex", justifyContent: "space-between", alignItems: "center" } },
          React.createElement("span", { style: { fontSize: 11, color: COLORS.accent } }, "GENERATED CODE"),
          React.createElement("button", { onClick: () => { navigator.clipboard?.writeText(generateCode); }, style: btnStyle }, "📋 Copy"),
        ),
        React.createElement("pre", { style: { flex: 1, margin: 0, padding: 12, overflow: "auto", fontSize: 10, lineHeight: 1.5, color: COLORS.text, whiteSpace: "pre-wrap" } }, generateCode),
      ),
    )
  );
}

ReactDOM.render(React.createElement(AdapterEditor), document.getElementById("root"));
</script>
</body>
</html>
